version: 2

models:
  - name: mart_national_horaire
    description: "Table principale Power BI — monitoring CO2 au pas 30min"
    columns:
      - name: date_heure
        description: "Horodatage unique de la mesure"
        data_tests:
          - not_null
          - unique

      - name: taux_co2
        description: "Taux CO2 en gCO2/kWh"
        data_tests:
          - not_null

      - name: indice_vert
        description: "Signal CO2 actionnable Vert/Orange/Rouge"
        data_tests:
          - not_null
          - accepted_values:
              config:
                severity: error
              values: ['Vert', 'Orange', 'Rouge']

      - name: consommation_mw
        description: "Consommation nationale en MW"
        data_tests:
          - not_null

  - name: mart_patterns_co2
    description: "Agrégats CO2 par heure x saison x jour — alimente la heatmap Power BI"
    columns:
      - name: heure
        description: "Heure de la journée (0-23)"
        data_tests:
          - not_null

      - name: saison
        description: "Saison météo française"
        data_tests:
          - not_null
          - accepted_values:
              config:
                severity: error
              values: ['Hiver', 'Printemps', 'Été', 'Automne']

      - name: avg_taux_co2
        description: "CO2 moyen en gCO2/kWh pour cette heure x saison"
        data_tests:
          - not_null

      - name: nb_observations
        description: "Nombre de mesures utilisées pour calculer la moyenne"
        data_tests:
          - not_null

  - name: mart_heures_vertes
    description: "Top 3 heures vertes par saison avec gain CO2 vs heure de pointe"
    columns:
      - name: saison
        description: "Saison météo française"
        data_tests:
          - not_null

      - name: rang
        description: "Rang 1 = heure la plus verte de la saison"
        data_tests:
          - not_null

      - name: heure_optimale
        description: "Heure de la journée recommandée (0-23)"
        data_tests:
          - not_null

      - name: gain_vs_pointe_pct
        description: "Gain en % vs heure de pointe"
        data_tests:
          - not_null

      - name: mart_regional_mensuel
        description: "Agrégat mensuel par région — alimente la carte choroplèthe Power BI"
        columns:
      - name: annee
        description: "Année"
        data_tests:
          - not_null

      - name: mois
        description: "Mois (1-12)"
        data_tests:
          - not_null

      - name: libelle_region
        description: "Nom de la région française"
        data_tests:
          - not_null

      - name: tco_renouvelables_moyen
        description: "TCO renouvelables composite moyen sur le mois"
        data_tests:
          - not_null